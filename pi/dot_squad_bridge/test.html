<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot Squad Bridge Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a1a; color: white; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background: #0056b3; }
        .log { margin-top: 20px; padding: 10px; background: #000; border: 1px solid #333; height: 200px; overflow-y: auto; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Dot Squad Bridge Test</h1>
    <p>This page sends messages to the Dot Squad Agent extension.</p>
    
    <button id="trigger">Trigger LED (Boot Pattern)</button>

    <div class="log" id="log"></div>

    <script>
        const logEl = document.getElementById('log');
        function log(msg) {
            const div = document.createElement('div');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        document.getElementById('trigger').addEventListener('click', () => {
            console.log("sending!")
            const message = {
                type: "LED_TRIGGER",
                pattern: "boot"
            };
            log("Sending message: " + JSON.stringify(message));
            window.postMessage(message, "*");
        });

        // Listen for responses (if background script replies via content script)
        // Note: content script usually needs to forward response back if needed.
    </script>
</body>
</html>
